<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KFS Tetris pro Kubu</title>
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                   minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="touch-action" content="none">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <style>
        * { -webkit-tap-highlight-color: rgba(0,0,0,0); }
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            background: #0a0a1a; width: 100%; height: 100%;
            touch-action: none;
        }
        #canvas { display: block; width: 100vw; height: 100vh; }

        /* --- Loading screen --- */
        #loading {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0a0a1a;
            font-family: 'Courier New', monospace;
            transition: opacity .6s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }

        /* Tetris blocks grid decoration */
        .blocks {
            display: grid; grid-template-columns: repeat(10, 24px);
            gap: 2px; margin-bottom: 40px; opacity: .7;
        }
        .blocks .b {
            width: 24px; height: 24px; border-radius: 3px;
            animation: blockPulse 2s ease-in-out infinite;
        }
        .blocks .e { width: 24px; height: 24px; }
        @keyframes blockPulse {
            0%, 100% { opacity: .4; }
            50% { opacity: 1; }
        }

        .title {
            font-size: 32px; font-weight: bold;
            color: #fff; letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0,255,255,.5), 0 0 40px rgba(0,255,255,.2);
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 18px; color: #0ff;
            letter-spacing: 2px; margin-bottom: 48px;
            text-shadow: 0 0 10px rgba(0,255,255,.4);
        }

        /* Falling pieces animation */
        .pieces { position: relative; width: 260px; height: 80px; overflow: hidden; margin-bottom: 32px; }
        .piece {
            position: absolute; top: -30px; opacity: .6;
            animation: fall 3s linear infinite;
        }
        .piece:nth-child(1) { left: 10%;  animation-delay: 0s;   color: #0ff; }
        .piece:nth-child(2) { left: 30%;  animation-delay: .7s;  color: #ff0; }
        .piece:nth-child(3) { left: 55%;  animation-delay: 1.4s; color: #f0f; }
        .piece:nth-child(4) { left: 80%;  animation-delay: 2.1s; color: #0f0; }
        @keyframes fall {
            0%   { transform: translateY(-30px); opacity: 0; }
            20%  { opacity: .7; }
            80%  { opacity: .7; }
            100% { transform: translateY(110px); opacity: 0; }
        }
        .piece svg { width: 28px; height: 28px; }

        .dots {
            font-size: 20px; color: #888; letter-spacing: 6px;
        }
        .dots span {
            animation: blink 1.4s steps(1) infinite;
        }
        .dots span:nth-child(2) { animation-delay: .35s; }
        .dots span:nth-child(3) { animation-delay: .7s; }
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
<div id="loading">
    <!-- Decorative tetris blocks -->
    <div class="blocks" id="blockGrid"></div>

    <div class="title">TETRIS</div>
    <div class="subtitle">pro Kubu</div>

    <!-- Falling pieces -->
    <div class="pieces">
        <div class="piece"><svg viewBox="0 0 4 1"><rect width="4" height="1" rx=".1" fill="currentColor"/></svg></div>
        <div class="piece"><svg viewBox="0 0 2 2"><rect width="2" height="2" rx=".1" fill="currentColor"/></svg></div>
        <div class="piece"><svg viewBox="0 0 3 2"><rect x="1" width="1" height="1" rx=".1" fill="currentColor"/><rect y="1" width="3" height="1" rx=".1" fill="currentColor"/></svg></div>
        <div class="piece"><svg viewBox="0 0 3 2"><rect width="2" height="1" rx=".1" fill="currentColor"/><rect x="1" y="1" width="2" height="1" rx=".1" fill="currentColor"/></svg></div>
    </div>

    <div class="dots">LOADING<span>.</span><span>.</span><span>.</span></div>
</div>

<canvas id="canvas"></canvas>
<script>
    // Generate decorative block grid
    (function() {
        var grid = document.getElementById('blockGrid');
        var colors = ['#0ff','#ff0','#a0f','#0f0','#f44','#48f','#f80'];
        // Sparse random pattern (roughly 25% filled)
        for (var i = 0; i < 30; i++) {
            var el = document.createElement('div');
            if (Math.random() < 0.25) {
                el.className = 'b';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.animationDelay = (Math.random() * 2).toFixed(1) + 's';
            } else {
                el.className = 'e';
            }
            grid.appendChild(el);
        }
    })();

    async function start() {
        main();
        // Hide loading screen once LibGDX canvas renders
        setTimeout(function() {
            var ls = document.getElementById('loading');
            if (ls) {
                ls.classList.add('hidden');
                setTimeout(function() { ls.remove(); }, 700);
            }
        }, 500);
    }
    window.addEventListener("load", start);
    document.addEventListener("gesturestart", function(e) { e.preventDefault(); });
    document.addEventListener("gesturechange", function(e) { e.preventDefault(); });
    document.addEventListener("gestureend", function(e) { e.preventDefault(); });
    document.addEventListener("touchmove", function(e) { e.preventDefault(); }, {passive: false});

    function resizeCanvas() {
        var canvas = document.getElementById("canvas");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
</script>
<script type="text/javascript" charset="utf-8" src="app.js"></script>
</body>
</html>
